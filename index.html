<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otmizador de Estoque e Frete</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Otmizador de Estoque e Frete</h1>
    <form action="#">
      <div>
        <div>
          <div class="card" style="width: 18rem">
            <img src="..." class="card-img-top" alt="..." />
            <div class="card-body">
              <h5 class="card-title">Card title</h5>
              <p class="card-text">
                Some quick example text to build on the card title and make up
                the bulk of the card’s content.
              </p>
              <a href="#" class="btn btn-primary">Go somewhere</a>
            </div>
          </div>
          <label for="camisa">Camisa Polo</label>
          <input type="checkbox" name="camisa" value="camisa" />
          <input
            type="number"
            name="qtdcamisa"
            value="qtdcamisa"
            placeholder="Informe a quantidade desejada."
          />
        </div>
        <div>
          <label for="calca">Calça Jeans Slim</label>
          <input type="checkbox" name="calca" value="calca" />
          <input
            type="number"
            name="qtdcalca"
            value="qtdcalca"
            placeholder="Informe a quantidade desejada."
          />
        </div>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="src/js/otimizadorEstoqueFrete.js"></script>
  </body>
</html>
