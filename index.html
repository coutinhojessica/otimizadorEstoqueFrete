<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Otmizador de Estoque e Frete</title>
    </head>
    <body>
        <h1>Otmizador de Estoque e Frete</h1>
        <form action="#">
            <div>
                <div>
                    <label for="camisa">Camisa Polo</label>
                    <input
                        type="checkbox"
                        name="camisa"
                        value="camisa"
                    />
                    <input
                        type="number"
                        name="qtdcamisa"
                        value="qtdcamisa"
                        placeholder="Informe a quantidade desejada."
                    />
                </div>
                <div>
                    <label for="calca">Calça Jeans Slim</label>
                    <input
                        type="checkbox"
                        name="calca"
                        value="calca"
                    />
                    <input
                        type="number"
                        name="qtdcalca"
                        value="qtdcalca"
                        placeholder="Informe a quantidade desejada."
                    />
                </div>
            </div>
        </form>
        <script src="src/js/otimizadorEstoqueFrete.js"></script>
    </body>
</html>
